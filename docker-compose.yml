version: '3.8'

services:
  plant-classifier:
    build:
      context: .
      dockerfile: Dockerfile
    
    ports:
      - "8000:8000"
    
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

# For GPU support, add:
# services:
#   plant-classifier:
#     ...
#     deploy:
#       resources:
#         reservations:
#           devices:
#             - driver: nvidia
#               count: 1
#               capabilities: [gpu]

# Run with:
# docker-compose up
# 
# Access API at: http://localhost:8000/docs
